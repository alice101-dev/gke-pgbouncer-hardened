# Default-deny both directions for PgBouncer pods, then allow only:
#   ingress : port 5432 from pods explicitly labelled as PgBouncer clients
#   egress  : port 5432 to the Cloud SQL private IP, plus DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgbouncer
  namespace: prod-hades
  labels:
    app: pgbouncer
    env: prod
spec:
  podSelector:
    matchLabels:
      app: pgbouncer
      env: prod
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        # Opt-in model: application pods must carry this label to reach PgBouncer.
        - podSelector:
            matchLabels:
              pgbouncer-client: "true"
      ports:
        - port: 5432
          protocol: TCP
  egress:
    # Cloud SQL private IP — keep in sync with [databases] in configmap-pgbouncer.yaml
    - to:
        - ipBlock:
            cidr: 10.100.1.5/32
      ports:
        - port: 5432
          protocol: TCP
    # DNS (needed if the backend host is ever a hostname instead of an IP)
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
